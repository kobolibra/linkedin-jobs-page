    .sk-box { background:linear-gradient(90deg,var(--line) 25%,var(--surface-2) 37%,var(--line) 63%);background-size:400% 100%;animation:sh 1.4s ease infinite;border-radius:6px; }
    .sk-mono { width:44px;height:44px;border-radius:10px; }
    .sk-l1 { height:13px;width:58%;margin-bottom:8px; }
    .sk-l2 { height:11px;width:33%; }
    @keyframes sh { 0%{background-position:100% 0} 100%{background-position:0 0} }
    .empty { display:none;text-align:center;padding:80px 20px;color:var(--ink-faint); }
    .empty.show { display:block; }
    .empty .big { font-family:var(--serif);font-size:20px;color:var(--ink-soft);margin-bottom:8px; }
    .totop { position:fixed;right:20px;bottom:20px;width:38px;height:38px;border-radius:12px;background:var(--navy);color:#f4f1e9;border:0;cursor:pointer;display:grid;place-items:center;opacity:0;pointer-events:none;transform:translateY(6px);transition:all .2s;box-shadow:var(--shadow);z-index:30; }
    .totop.show { opacity:1;pointer-events:auto;transform:none; }
    .totop svg { width:16px;height:16px; }
    .totop:hover { background:var(--navy-2); }
    [data-theme="dark"] .totop { background:var(--gold);color:#14130f; }
    [data-theme="dark"] .totop:hover { background:var(--gold-hi); }
    .footer { margin-top:56px;padding-top:20px;border-top:1px solid var(--line-strong);font-size:12px;color:var(--ink-faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-family:var(--mono); }
    .footer a { color:var(--ink-soft);text-decoration:none; }
    .footer a:hover { color:var(--gold-deep); }
    body.compact .job { padding:10px 4px; }
    body.compact .job-title { font-size:14px; }
    body.compact .mono { width:38px;height:38px;font-size:15px; }
    body.compact .day { margin-top:24px; }
    @media (max-width:720px) {
      .shell { padding:0 16px 56px; }
      .masthead { padding:34px 0 20px; }
      .masthead .eyebrow { padding-right:68px; }
      .masthead .eyebrow::after { display:none; }
      .masthead h1 { font-size:30px;padding-right:76px; }
      .masthead .lede { font-size:14px;white-space:normal;overflow:visible;padding-right:76px; }
      .masthead .tagline { padding-right:76px; }
      .theme-toggle { top:30px;right:0; }
      .mast-stack { right:4px;top:72px;width:64px;height:74px; }
      .mast-stack .mp-2,.mast-stack .mp-3,.mast-stack .mp-4 { display:none; }
      .mast-photo { padding:5px; }
      .mast-photo::after { inset:5px; }
      .mast-clip { width:17px;height:32px;top:-12px;left:7px; }
      .mast-avatar { width:54px;height:54px; }
      .mast-bg { display:none; }
      .stats { grid-template-columns:repeat(2,1fr);margin-top:20px; }
      .stat { padding:14px 16px; }
      .stat .v { font-size:19px; }
      .analytics-card { grid-template-columns:1fr; }
      .ac-col + .ac-col { border-left:0;border-top:1px solid var(--line); }
      .toolbar { padding:10px 0; }
      .toolbar-inner { gap:8px; }
      .search { flex:1 1 100%;min-width:0; }
      .search .s-key { display:none; }
      .segmented { width:100%; }
      .seg { flex:1;text-align:center;padding:7px 4px; }
      select.ctrl { flex:1 1 calc(50% - 4px);min-width:0;max-width:none;width:100%; }
      .pill { flex:1 1 calc(50% - 4px);justify-content:center; }
      .count { margin-left:0;width:100%;text-align:right; }
      .job { grid-template-columns:38px 1fr;gap:12px;padding:13px 2px; }
      .mono { width:38px;height:38px;font-size:15px; }
      .job-title { font-size:15px; }
      .job-sub { white-space:normal; }
      .job-right { grid-column:2;justify-content:flex-start;margin-top:5px;flex-wrap:wrap;gap:9px; }
    }
    @media (max-width:420px) {
      .masthead h1 { font-size:23px; }
      .day-head { flex-wrap:wrap;gap:5px 10px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <button class="theme-toggle" id="themeToggle" role="switch" aria-label="切换深浅主题"></button>
      <div class="mast-stack" id="mastStack"><div class="mast-photo mp-4"><img class="mast-avatar" alt="" /></div><div class="mast-photo mp-3"><img class="mast-avatar" alt="" /></div><div class="mast-photo mp-2"><img class="mast-avatar" alt="" /></div><div class="mast-photo mp-1"><span class="mast-clip"><svg viewBox="0 0 22 42" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14 V32 a4.2 4.2 0 0 1 -8.4 0 V10 a3.1 3.1 0 0 1 6.2 0 V29" stroke="currentColor" stroke-width="2.5"/><path d="M15 14 V32 a4.2 4.2 0 0 1 -8.4 0 V10 a3.1 3.1 0 0 1 6.2 0 V29" stroke="rgba(255,255,255,.5)" stroke-width="1" transform="translate(-.55 -.55)"/></svg></span><img class="mast-avatar" id="mastAvatar" alt="" /></div></div>
      <div class="mast-bg" id="mastBg"></div>
      <p class="eyebrow reveal">Finance Careers · CN / HK / SG</p>
      <h1 class="reveal" style="animation-delay:.05s">LinkedIn 金融职位精选</h1>
      <p class="lede reveal" style="animation-delay:.1s">聚合自 LinkedIn 的金融行业最新职位，覆盖中国大陆、香港与新加坡市场，每 6 小时自动更新一次。</p>
      <p class="tagline reveal" style="animation-delay:.15s">祝我们都能拿到 dream offer 👏</p>
      <div class="stats reveal" style="animation-delay:.2s">
        <div class="stat"><p class="k">职位总数</p><p class="v" id="stat-total">—</p></div>
        <div class="stat"><p class="k">覆盖机构</p><p class="v" id="stat-comp">—</p></div>
        <div class="stat"><p class="k"><span class="live"></span>最近更新</p><p class="v" id="stat-updated" style="white-space:nowrap">—</p></div>
        <div class="stat"><p class="k">访客流量 (PV)</p><p class="v"><span id="busuanzi_container_site_pv"><span id="busuanzi_value_site_pv">—</span></span></p></div>
      </div>
      <div class="analytics reveal" style="animation-delay:.25s">
        <div class="card analytics-card">
          <div class="ac-col"><h3>地区分布</h3><div id="dist"></div></div>
          <div class="ac-col"><h3>近 7 日新增</h3><div class="spark" id="spark"></div></div>
        </div>
      </div>
    </header>
    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="search">
          <svg class="s-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="搜索职位或机构…" autocomplete="off" />
          <span class="s-key">/</span>
        </div>
        <div class="segmented" id="regions">
          <button class="seg active" data-region="all">全部</button>
          <button class="seg" data-region="CN">CN</button>
          <button class="seg" data-region="HK">HK</button>
          <button class="seg" data-region="SG">SG</button>
          <button class="seg" data-region="OTHER">其他</button>
        </div>
        <select class="ctrl" id="age">
          <option value="all">全部时间</option>
          <option value="0">今天</option>
          <option value="1-3">1–3 天</option>
          <option value="4-7">4–7 天</option>
          <option value="8-14">8–14 天</option>
          <option value="15+">15 天以上</option>
        </select>
        <select class="ctrl" id="company"><option value="all">全部机构</option></select>
        <button class="pill" id="favToggle" aria-label="只看收藏"></button>
        <button class="pill" id="densityToggle" aria-label="切换密度"></button>
        <span class="count tnum" id="count"></span>
      </div>
      <div class="blocked-bar" id="blockedBar"></div>
    </div>
    <main id="jobs"></main>
    <div class="empty" id="empty"><div class="big">未找到匹配的职位</div><div>试试调整筛选条件或清空搜索关键词。</div></div>
    <footer class="footer">
      <span>数据来源：LinkedIn · 每 6 小时自动同步</span>
      <a href="https://linkedin.claudecowork.workers.dev/">linkedin.claudecowork.workers.dev</a>
    </footer>
  </div>
  <button class="totop" id="totop" aria-label="回到顶部"></button>
  <script>
    const IC={
      star:'<svg class="star-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2.6 15.09 8.86 22 9.87 17 14.74 18.18 21.62 12 18.37 5.82 21.62 7 14.74 2 9.87 8.91 8.86 12 2.6"/></svg>',
      ban:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/></svg>',
      x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
      chevron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
      up:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>',
      rows:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>'
    };
    const SUN='<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.5" stroke="none"/><g fill="none"><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></g></svg>';
    const MOON='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    const tbtn=document.getElementById('themeToggle');
    tbtn.innerHTML='<span class="tt-ic tt-sun">'+SUN+'</span><span class="tt-track"><span class="tt-thumb"></span></span><span class="tt-ic tt-moon">'+MOON+'</span>';
    function setTheme(t){document.documentElement.setAttribute('data-theme',t);tbtn.setAttribute('data-mode',t);tbtn.setAttribute('aria-checked',t==='dark'?'true':'false');localStorage.setItem('theme',t);}
    setTheme(localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));
    tbtn.addEventListener('click',()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));
    (function(){
      const stack=document.getElementById('mastStack');
      if(!stack)return;
      const front=document.getElementById('mastAvatar');
      if(front){front.addEventListener('load',()=>stack.classList.add('show'));front.addEventListener('error',()=>{stack.style.display='none';});}
      stack.querySelectorAll('.mast-avatar').forEach(im=>{im.src='avatars/1.jpg';});
    })();
    (function(){
      const bg=document.getElementById('mastBg');
      if(!bg)return;
      const pic='avatars/'+(Math.random()<0.5?'2':'3')+'.jpeg';
      const im=new Image();
      im.onload=()=>{bg.style.backgroundImage='url('+pic+')';bg.classList.add('show');};
      im.onerror=()=>{bg.style.display='none';};
      im.src=pic;
    })();
    document.getElementById('totop').innerHTML=IC.up;
    document.getElementById('favToggle').innerHTML=IC.star+'<span>收藏</span>';
    const dbtn=document.getElementById('densityToggle');
    dbtn.innerHTML=IC.rows+'<span>紧凑</span>';
    const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(!reduce)document.body.classList.add('anim');
    const REGIONS={CN:{label:"中国大陆"},HK:{label:"香港"},SG:{label:"新加坡"},OTHER:{label:"其他"}};
    const norm=loc=>{const u=(loc||"OTHER").toUpperCase();return REGIONS[u]?u:"OTHER";};
    const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    const monogram=n=>{const t=(n||"?").trim();return t?t[0].toUpperCase():"?";};
    const jobId=link=>{if(!link)return"";const path=String(link).split(/[?#]/)[0];const m=path.match(/(\d{5,})\/?$/)||String(link).match(/[?&]currentJobId=(\d+)/);return m?("ln:"+m[1]):path.replace(/\/+$/,"");};
    const keyOf=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const dayKey=iso=>{const d=new Date(iso);return isNaN(d)?"—":keyOf(d);};
    const dayLabel=iso=>{const d=new Date(iso);return isNaN(d)?"未知日期":d.toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});};
    const seenAt=j=>j.firstSeen||j.pushTime;
    const ageDays=iso=>{const d=new Date(iso);if(isNaN(d))return null;return Math.max(0,Math.floor((Date.now()-d)/864e5));};
    const ageMatch=(sel,d)=>{if(sel==="all")return true;if(d==null)return false;if(sel==="15+")return d>=15;const p=sel.split("-").map(Number);return p[1]==null?d===p[0]:(d>=p[0]&&d<=p[1]);};
    function levelOf(t){t=(t||"").toLowerCase();if(/\bintern(s|ship)?\b/.test(t)||/实习/.test(t))return"Intern";if(/\b(md|managing director|director|head of)\b/.test(t)||/总监|主管/.test(t))return"Director+";if(/\b(vp|svp|evp|vice president)\b/.test(t)||/副总裁/.test(t))return"VP";if(/associate/.test(t)||/经理/.test(t))return"Associate";if(/analyst/.test(t)||/分析师|专员/.test(t))return"Analyst";return"Other";}
    function animNum(el,target,suffix){suffix=suffix||"";if(reduce){el.innerHTML=target.toLocaleString()+suffix;return;}const dur=900,start=performance.now();const step=now=>{const p=Math.min((now-start)/dur,1),e=1-Math.pow(1-p,3);el.innerHTML=Math.round(target*e).toLocaleString()+suffix;if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);}
    const favs=new Set(JSON.parse(localStorage.getItem("favs")||"[]"));
    const reads=new Set(JSON.parse(localStorage.getItem("reads")||"[]"));
    const blocked=new Set(JSON.parse(localStorage.getItem("blocked")||"[]"));
    const saveFavs=()=>localStorage.setItem("favs",JSON.stringify([...favs]));
    const saveReads=()=>localStorage.setItem("reads",JSON.stringify([...reads]));
    const saveBlocked=()=>localStorage.setItem("blocked",JSON.stringify([...blocked]));
    (function(){if(localStorage.getItem("favKeyV")==="2")return;[favs,reads].forEach(set=>{const arr=[...set];set.clear();arr.forEach(k=>set.add(jobId(k)));});saveFavs();saveReads();localStorage.setItem("favKeyV","2");})();
    const jobsEl=document.getElementById("jobs"),emptyEl=document.getElementById("empty"),searchEl=document.getElementById("search"),companyEl=document.getElementById("company"),ageEl=document.getElementById("age"),regionsEl=document.getElementById("regions"),favEl=document.getElementById("favToggle"),countEl=document.getElementById("count"),blockedBar=document.getElementById("blockedBar");
    let activeRegion="all",favOnly=false,blockedOpen=false;
    function setDensity(d){const c=d==="compact";document.body.classList.toggle("compact",c);dbtn.classList.toggle("active",c);localStorage.setItem("density",d);}
    setDensity(localStorage.getItem("density")||"comfortable");
    dbtn.addEventListener("click",()=>setDensity(document.body.classList.contains("compact")?"comfortable":"compact"));
    function renderBlocked(){
      if(blocked.size===0){blockedBar.classList.remove("show","open");blockedBar.innerHTML="";blockedOpen=false;return;}
      blockedBar.classList.add("show");blockedBar.classList.toggle("open",blockedOpen);
      blockedBar.innerHTML='<button class="bl-toggle" id="blToggle">已屏蔽机构 ('+blocked.size+') <span class="bl-caret">'+IC.chevron+'</span></button><div class="bl-list">'+[...blocked].map(c=>'<span class="bl-chip">'+esc(c)+'<button data-c="'+esc(c)+'" aria-label="取消屏蔽">'+IC.x+'</button></span>').join('')+'<button class="bl-clear" id="blClear">全部清除</button></div>';
    }
    blockedBar.addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;if(b.id==="blToggle"){blockedOpen=!blockedOpen;blockedBar.classList.toggle("open",blockedOpen);return;}if(b.id==="blClear"){blocked.clear();}else if(b.dataset.c!=null){blocked.delete(b.dataset.c);}saveBlocked();renderBlocked();apply();});
    renderBlocked();
    jobsEl.innerHTML=Array.from({length:6}).map(()=>'<div class="sk"><div class="sk-box sk-mono"></div><div><div class="sk-box sk-l1"></div><div class="sk-box sk-l2"></div></div></div>').join("");
    fetch("jobs.json?_="+Date.now())
      .then(r=>r.json())
      .then(data=>{
        if(!Array.isArray(data))data=[];
        jobsEl.innerHTML="";
        animNum(document.getElementById("stat-total"),data.length);
        const companies=[...new Set(data.map(j=>j.company).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"zh-Hans-CN"));
        animNum(document.getElementById("stat-comp"),companies.length);
        const lastUpd=data.reduce((m,j)=>{const t=j.pushTime||j.firstSeen||"";return t>m?t:m;},"");
        if(lastUpd){const d=new Date(lastUpd);if(!isNaN(d))document.getElementById("stat-updated").innerHTML='<span style="font-size:15px">'+d.toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})+'</span>';}
        companies.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;companyEl.appendChild(o);});
        const rc={CN:0,HK:0,SG:0,OTHER:0};data.forEach(j=>rc[norm(j.location)]++);
        const rmax=Math.max(...Object.values(rc),1);
        const distEl=document.getElementById("dist");
        distEl.innerHTML=Object.keys(rc).filter(k=>rc[k]>0).map(k=>{const pct=data.length?Math.round(rc[k]/data.length*100):0;return'<div class="dist-row" data-region="'+k+'"><span class="dist-label">'+REGIONS[k].label+'</span><div class="dist-track"><div class="dist-fill" data-w="'+(rc[k]/rmax*100)+'"></div></div><span class="dist-val tnum">'+rc[k]+'<small>'+pct+'%</small></span></div>';}).join("");
        requestAnimationFrame(()=>distEl.querySelectorAll(".dist-fill").forEach(f=>{f.style.width=f.dataset.w+"%";}));
        const counts={};data.forEach(j=>{const k=dayKey(seenAt(j));counts[k]=(counts[k]||0)+1;});
        const today=new Date(),days=[];
        for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push({label:d.toLocaleDateString("en-US",{weekday:"short"}),count:counts[keyOf(d)]||0});}
        const smax=Math.max(...days.map(d=>d.count),1);
        const sparkEl=document.getElementById("spark");
        sparkEl.innerHTML=days.map(d=>'<div class="spark-col"><div class="spark-bar" data-h="'+(d.count/smax*100)+'">'+(d.count?'<span>'+d.count+'</span>':'')+'</div><span class="spark-label">'+d.label+'</span></div>').join("");
        requestAnimationFrame(()=>sparkEl.querySelectorAll(".spark-bar").forEach(b=>{b.style.height=b.dataset.h+"%";}));
        const groups=new Map();
        data.forEach(j=>{const t=seenAt(j);const k=dayKey(t);if(!groups.has(k))groups.set(k,{label:dayLabel(t),items:[]});groups.get(k).items.push(j);});
        let first=true;
        for(const[,g]of groups){
          const sec=document.createElement("section");sec.className="day";
          const head=document.createElement("div");head.className="day-head";
          head.innerHTML='<span class="day-date">'+esc(g.label)+'</span><span class="day-meta tnum" data-role="daycount">'+g.items.length+' 个职位</span>'+(first?'<span class="day-new">Latest</span>':'');
          sec.appendChild(head);
          g.items.forEach((job,idx)=>{
            const r=norm(job.location),lvl=levelOf(job.title),id=jobId(job.link)||(job.title+"|"+job.company);
            const a=document.createElement("article");a.className="job"+(reads.has(id)?" read":"");
            if(first&&!reduce)a.style.animationDelay=Math.min(idx*.03,.45)+"s";
            const _ad=ageDays(seenAt(job));a.dataset.region=r;a.dataset.comp=job.company||"";a.dataset.level=lvl;a.dataset.age=(_ad==null?"":_ad);a.dataset.id=id;
            a.dataset.search=((job.title||"")+" "+(job.company||"")).toLowerCase();
            a.innerHTML='<div class="mono">'+esc(monogram(job.company))+'</div><div class="job-main"><a class="job-title" href="'+esc(job.link)+'" target="_blank" rel="noopener">'+esc(job.title)+'</a><div class="job-sub">'+esc(job.company||"未知机构")+'</div></div><div class="job-right">'+(_ad!=null?'<span class="age">'+(_ad===0?"今天":_ad+"天前")+'</span>':'')+(lvl!=="Other"?'<span class="lvl">'+lvl+'</span>':'')+'<span class="tag">'+r+'</span><button class="icon-btn star'+(favs.has(id)?" on":"")+'" aria-label="收藏">'+IC.star+'</button><button class="icon-btn ban" aria-label="屏蔽">'+IC.ban+'</button></div>';
            a.querySelector(".job-title").addEventListener("click",()=>{reads.add(id);saveReads();a.classList.add("read");});
            const star=a.querySelector(".star");
            star.addEventListener("click",e=>{e.preventDefault();if(favs.has(id)){favs.delete(id);star.classList.remove("on");}else{favs.add(id);star.classList.add("on");}saveFavs();if(favOnly)apply();});
            const ban=a.querySelector(".ban");
            ban.addEventListener("click",e=>{e.preventDefault();const c=job.company;if(c){blocked.add(c);saveBlocked();renderBlocked();apply();}});
            sec.appendChild(a);
          });
          jobsEl.appendChild(sec);first=false;
        }
        regionsEl.addEventListener("click",e=>{const b=e.target.closest(".seg");if(!b)return;regionsEl.querySelectorAll(".seg").forEach(x=>x.classList.remove("active"));b.classList.add("active");activeRegion=b.dataset.region;apply();});
        favEl.addEventListener("click",()=>{favOnly=!favOnly;favEl.classList.toggle("active",favOnly);apply();});
        searchEl.addEventListener("input",apply);
        companyEl.addEventListener("change",apply);
        ageEl.addEventListener("change",apply);
        apply();
      })
      .catch(()=>{jobsEl.innerHTML="";emptyEl.classList.add("show");emptyEl.querySelector(".big").textContent="职位数据加载失败";});
    function apply(){
      const q=searchEl.value.trim().toLowerCase(),comp=companyEl.value,ageSel=ageEl.value;
      companyEl.classList.toggle("on",comp!=="all");ageEl.classList.toggle("on",ageSel!=="all");
      let visible=0;
      jobsEl.querySelectorAll(".day").forEach(sec=>{
        let shown=0;
        sec.querySelectorAll(".job").forEach(card=>{
          const ok=!blocked.has(card.dataset.comp)&&(activeRegion==="all"||card.dataset.region===activeRegion)&&(comp==="all"||card.dataset.comp===comp)&&ageMatch(ageSel,card.dataset.age===""?null:+card.dataset.age)&&(!favOnly||favs.has(card.dataset.id))&&(!q||card.dataset.search.includes(q));
          card.classList.toggle("hidden",!ok);if(ok)shown++;
        });
        const c=sec.querySelector('[data-role="daycount"]');if(c)c.textContent=shown+" 个职位";
        sec.style.display=shown?"":"none";visible+=shown;
      });
      countEl.innerHTML="显示 <b>"+visible+"</b> 个职位";
      emptyEl.classList.toggle("show",visible===0);
    }
    document.addEventListener("keydown",e=>{
      const tag=(e.target.tagName||"").toLowerCase();
      if(tag==="input"||tag==="select"||tag==="textarea")return;
      if(e.key==="/"){e.preventDefault();searchEl.focus();}
      else if(e.key.toLowerCase()==="t"){setTheme(document.documentElement.getAttribute("data-theme")==='dark'?'light':'dark');}
    });
    const totop=document.getElementById("totop");
    addEventListener("scroll",()=>{totop.classList.toggle("show",window.scrollY>600);},{passive:true});
    totop.addEventListener("click",()=>scrollTo({top:0,behavior:"smooth"}));
  </script>
  <script src="guestbook.js"></script>
</body>
</html>
