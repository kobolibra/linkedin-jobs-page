  <style>

      --mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    }
    [data-theme="dark"] {
      --bg:#060e17; --surface:#101923; --surface-2:#0b141e;
      --ink:#f2eee5; --ink-soft:#b5aa9b; --ink-faint:#746d64;
      --line:#263241; --line-strong:#3e4c5b;
      --accent:#c9ad78; --accent-2:#d8c293; --accent-soft:rgba(201,173,120,.14); --navy:#f2eee5;
      --navy-2:#9db4c8; --navy-3:#c1d0de;
      --gold-hi:#e4d0a0; --gold:#c9ad78; --gold-deep:#947444;
      --ember:#c7795f; --chart:#9db4c8; --chart-track:#111f2d;
      --shadow:0 1px 2px rgba(0,0,0,.55), 0 14px 34px rgba(0,0,0,.48);

    * { box-sizing:border-box; }
    html { -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
    body { font-family:var(--sans); background:radial-gradient(circle at 50% -120px,rgba(184,155,102,.16),transparent 360px),linear-gradient(180deg,#fffdf8 0%,var(--bg) 340px); color:var(--ink); margin:0; line-height:1.5; transition:background .3s, color .3s; }
    [data-theme="dark"] body { background:radial-gradient(circle at 50% -120px,rgba(201,173,120,.11),transparent 360px),linear-gradient(180deg,#071421 0%,var(--bg) 340px); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

    .live { display:inline-block; width:7px; height:7px; border-radius:50%; background:#1f9d55; margin-right:7px; vertical-align:middle; box-shadow:0 0 0 3px color-mix(in srgb,#1f9d55 24%,transparent); }
    @media (prefers-reduced-motion: no-preference) {
      body.anim .reveal { opacity:0; animation:fadeUp .7s cubic-bezier(.2,.8,.2,1) forwards; }
      body.anim .job { animation:fadeUp .5s both; }
      .live { animation:pulse 1.8s ease-in-out infinite; }
    }

    .masthead { position:relative; padding:48px 0 26px; border-bottom:1px solid var(--line-strong); }
    .masthead::before { content:""; position:absolute; left:0; right:0; top:0; height:4px; background:linear-gradient(90deg,var(--navy),var(--navy-2) 58%,var(--gold)); border-radius:0 0 2px 2px; box-shadow:0 8px 24px rgba(8,23,36,.1); }
    .masthead::after { content:""; position:absolute; right:56px; top:74px; width:180px; height:180px; border-radius:50%; background:radial-gradient(circle,rgba(184,155,102,.085),transparent 66%); pointer-events:none; }
    .eyebrow { font-family:var(--mono); font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--gold-deep); font-weight:800; margin:0 0 17px; padding-right:54px; display:flex; align-items:center; gap:14px; }
    [data-theme="dark"] .eyebrow { color:var(--gold); }
    .eyebrow::after { content:""; flex:1; height:1px; background:linear-gradient(90deg,var(--line-strong),transparent); }
    .masthead h1 { font-family:var(--serif); font-weight:650; font-size:40px; line-height:1.08; letter-spacing:-.035em; margin:0; color:var(--navy); position:relative; z-index:1; }
    .masthead .lede { margin:14px 0 0; color:var(--ink-soft); font-size:15px; white-space:nowrap; overflow-x:auto; scrollbar-width:none; position:relative; z-index:1; }

    .theme-toggle { position:absolute; top:41px; right:0; z-index:3; width:32px; height:32px; border-radius:8px; border:1px solid transparent; background:transparent; color:var(--ink-faint); cursor:pointer; display:grid; place-items:center; transition:color .18s, background .18s; box-shadow:none; }
    .theme-toggle:hover { color:var(--navy); background:color-mix(in srgb,var(--ink) 7%,transparent); }
    .theme-toggle svg { width:17px; height:17px; }

    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:0; background:var(--surface); border:1px solid var(--line-strong); border-radius:12px; overflow:hidden; margin:30px 0 0; box-shadow:var(--shadow-strong); position:relative; z-index:1; }
    .stats::before { content:""; position:absolute; left:0; right:0; top:0; height:2px; background:linear-gradient(90deg,var(--navy),var(--gold)); opacity:.86; }
    .stat { background:linear-gradient(180deg,var(--surface),color-mix(in srgb,var(--surface-2) 72%,var(--surface))); padding:18px 19px 17px; border-right:1px solid var(--line); }
    .stat:last-child { border-right:0; }
    .stat .k { font-family:var(--mono); font-size:11px; letter-spacing:.11em; text-transform:uppercase; color:var(--ink-faint); margin:0 0 7px; }
    .stat .v { font-family:var(--mono); font-size:23px; font-weight:700; color:var(--navy); letter-spacing:-.03em; font-variant-numeric:tabular-nums; }
    .stat .v small { font-size:12px; color:var(--ink-faint); font-weight:500; margin-left:4px; }

    .analytics { display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:18px; margin-top:18px; }
    .card { background:linear-gradient(180deg,var(--surface),color-mix(in srgb,var(--surface-2) 68%,var(--surface))); border:1px solid var(--line); border-radius:12px; padding:20px 22px; box-shadow:var(--shadow); transition:transform .2s ease, box-shadow .2s ease, border-color .2s; }
    .card:hover { transform:translateY(-2px); border-color:var(--line-strong); box-shadow:var(--shadow-strong); }
    .card h3 { margin:0 0 17px; font-family:var(--mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint); font-weight:800; }
    .dist-row { display:grid; grid-template-columns:76px 1fr 56px; align-items:center; gap:12px; margin-bottom:10px; }
    .dist-row:last-child { margin-bottom:0; }
    .dist-label { font-size:13px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .dist-track { height:7px; background:var(--surface-2); border:1px solid var(--line); border-radius:999px; overflow:hidden; }
    .dist-fill { width:0; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--region,var(--other)),color-mix(in srgb,var(--region,var(--other)) 58%,var(--surface))); transition:width .7s cubic-bezier(.2,.8,.2,1); }
    .dist-val { font-family:var(--mono); font-size:13px; color:var(--navy); text-align:right; font-variant-numeric:tabular-nums; }
    .dist-val small { display:block; font-size:10px; color:var(--ink-faint); font-weight:400; margin-top:1px; }
    .spark { display:flex; align-items:flex-end; gap:10px; height:104px; padding:8px 2px 0; position:relative; }
    .spark::after { content:""; position:absolute; left:0; right:0; bottom:22px; height:1px; background:var(--line); }
    .spark-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; position:relative; }
    .spark-bar { width:100%; max-width:26px; height:0; background:linear-gradient(to top,var(--navy-2),color-mix(in srgb,var(--navy-2) 52%,var(--surface))); border-radius:5px 5px 0 0; min-height:3px; transition:height .7s cubic-bezier(.2,.8,.2,1); position:relative; z-index:1; }
    .spark-bar span { position:absolute; top:-18px; left:50%; transform:translateX(-50%); font-family:var(--mono); font-size:11px; color:var(--navy); font-variant-numeric:tabular-nums; }
    .spark-label { position:relative; z-index:1; font-family:var(--mono); font-size:11px; color:var(--ink-faint); }

    [data-theme="dark"] .card { background:linear-gradient(180deg,#101923,#0b141e); }
    [data-theme="dark"] .stat { background:linear-gradient(180deg,#111b26,#0b141e); }
    [data-theme="dark"] .stat .v { text-shadow:0 0 20px color-mix(in srgb,var(--accent) 16%,transparent); }
    [data-theme="dark"] .seg.active { box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 32%,transparent), 0 0 14px color-mix(in srgb,var(--accent) 18%,transparent); }
    [data-theme="dark"] .spark-bar { background:linear-gradient(to top,var(--navy-2),color-mix(in srgb,var(--navy-2) 46%,var(--surface))); }

    .toolbar { position:sticky; top:0; z-index:20; background:color-mix(in srgb,var(--bg) 88%,transparent); backdrop-filter:saturate(180%) blur(14px); -webkit-backdrop-filter:saturate(180%) blur(14px); border-bottom:1px solid var(--line-strong); margin:28px 0 0; padding:14px 0; }
    .toolbar-inner { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .search { position:relative; flex:1 1 240px; min-width:190px; }
    .search input { width:100%; padding:10px 12px 10px 36px; border:1px solid var(--line-strong); border-radius:9px; background:var(--surface); font-size:14px; color:var(--ink); font-family:var(--sans); transition:border-color .15s, box-shadow .15s, background .15s; box-shadow:0 1px 0 rgba(255,255,255,.55); }
    .search input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 16%,transparent); }
    .search .s-ic { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--ink-faint); pointer-events:none; }
    .search .s-key { position:absolute; right:10px; top:50%; transform:translateY(-50%); font-family:var(--mono); font-size:11px; color:var(--ink-faint); border:1px solid var(--line-strong); border-radius:5px; padding:1px 6px; pointer-events:none; background:var(--surface-2); }
    .segmented { display:inline-flex; background:var(--surface); border:1px solid var(--line-strong); border-radius:9px; padding:3px; gap:2px; box-shadow:0 1px 0 rgba(255,255,255,.55); }
    .seg { border:0; background:transparent; font-family:var(--sans); font-size:13px; color:var(--ink-soft); padding:6px 12px; border-radius:6px; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .seg:hover { color:var(--ink); }
    .seg.active { background:linear-gradient(180deg,var(--navy-2),var(--navy)); color:var(--surface); font-weight:650; }
    select.ctrl { padding:9px 12px; border:1px solid var(--line-strong); border-radius:9px; background:var(--surface); font-size:13px; color:var(--ink); font-family:var(--sans); max-width:190px; cursor:pointer; }
    select.ctrl:focus { outline:none; border-color:var(--accent); }
    .pill { display:inline-flex; align-items:center; gap:6px; padding:9px 12px; border:1px solid var(--line-strong); border-radius:9px; background:var(--surface); font-size:13px; color:var(--ink-soft); cursor:pointer; font-family:var(--sans); transition:all .15s; }
    .pill svg { width:15px; height:15px; }
    .pill:hover { color:var(--ink); border-color:var(--accent); transform:translateY(-1px); }
    .pill.active { color:var(--accent-2); border-color:var(--accent); background:color-mix(in srgb,var(--accent) 9%,transparent); }
    .pill.active .star-ic { fill:var(--accent); }
    .count { margin-left:auto; font-size:13px; color:var(--ink-faint); font-family:var(--mono); white-space:nowrap; font-variant-numeric:tabular-nums; }
    .count b { color:var(--navy); }

    .blocked-bar { display:none; flex-wrap:wrap; align-items:center; gap:8px; padding:12px 2px 0; }
    .blocked-bar.show { display:flex; }
    .bl-toggle { display:inline-flex; align-items:center; gap:6px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; color:var(--ink-faint); background:transparent; border:0; cursor:pointer; padding:0; font-family:var(--mono); }
    .bl-toggle:hover { color:var(--accent); }
    .bl-caret { display:inline-flex; transition:transform .2s; }
    .bl-caret svg { width:13px; height:13px; }
    .blocked-bar.open .bl-caret { transform:rotate(180deg); }
    .bl-list { display:none; flex-wrap:wrap; align-items:center; gap:8px; width:100%; }
    .blocked-bar.open .bl-list { display:flex; }
    .bl-chip { display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--ink-soft); background:var(--surface-2); border:1px solid var(--line-strong); border-radius:999px; padding:3px 4px 3px 11px; }
    .bl-chip button { border:0; background:transparent; cursor:pointer; color:var(--ink-faint); display:grid; place-items:center; padding:2px; border-radius:50%; transition:color .15s; }
    .bl-chip button svg { width:13px; height:13px; }
    .bl-chip button:hover { color:var(--cn); }
    .bl-clear { font-size:12px; color:var(--ink-faint); background:transparent; border:0; cursor:pointer; text-decoration:underline; text-underline-offset:2px; }
    .bl-clear:hover { color:var(--accent); }

    .day { margin-top:34px; }
    .day-head { display:flex; align-items:baseline; gap:12px; padding-bottom:11px; border-bottom:1px solid var(--line-strong); margin-bottom:4px; }
    .day-date { font-family:var(--serif); font-size:18px; font-weight:650; color:var(--navy); letter-spacing:-.015em; }
    .day-meta { font-size:12px; color:var(--ink-faint); font-family:var(--mono); font-variant-numeric:tabular-nums; }
    .day-new { font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent-2); border:1px solid color-mix(in srgb,var(--accent) 72%,var(--line)); border-radius:999px; padding:2px 8px; font-weight:700; background:color-mix(in srgb,var(--accent) 8%,transparent); }

    .job { display:grid; grid-template-columns:44px 1fr auto; align-items:center; gap:16px; padding:16px 4px; border-bottom:1px solid var(--line); position:relative; }
    .job::before { content:""; position:absolute; left:-4px; top:12px; bottom:12px; width:3px; border-radius:3px; background:var(--region,var(--line-strong)); opacity:0; transition:opacity .15s; }
    .job:hover { background:linear-gradient(90deg,color-mix(in srgb,var(--surface) 84%,var(--surface-2)),transparent); border-radius:10px; }
    .job:hover::before { opacity:1; }
    .job.hidden { display:none; }
    .job.read .job-title { color:var(--ink-faint); }
    .job.read .mono { opacity:.55; }
    .mono { width:44px; height:44px; border-radius:9px; display:grid; place-items:center; font-family:var(--serif); font-weight:650; font-size:17px; color:var(--region,var(--navy)); background:var(--region-bg,var(--surface-2)); border:1px solid color-mix(in srgb,var(--region,#9aa3b0) 22%,transparent); user-select:none; }
    .job-main { min-width:0; }
    .job-title { font-size:15.5px; font-weight:650; color:var(--ink); text-decoration:none; line-height:1.35; letter-spacing:-.006em; }
    .job-title:hover { color:var(--accent-2); text-decoration:underline; text-underline-offset:3px; }
    .job-sub { font-size:13px; color:var(--ink-soft); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .job-right { display:flex; align-items:center; gap:8px; }
    .lvl { font-size:11px; font-weight:650; color:var(--ink-soft); background:var(--surface-2); border:1px solid var(--line); padding:3px 8px; border-radius:6px; white-space:nowrap; }
    .tag { font-size:11px; font-weight:700; letter-spacing:.06em; padding:4px 10px; border-radius:999px; color:var(--region,var(--other)); background:var(--region-bg,var(--other-bg)); white-space:nowrap; }
    .icon-btn { width:30px; height:30px; display:grid; place-items:center; border:0; background:transparent; cursor:pointer; color:var(--ink-faint); border-radius:8px; transition:all .15s; }
    .icon-btn svg { width:17px; height:17px; }
    .icon-btn:hover { color:var(--ink); background:var(--surface-2); transform:scale(1.08); }
    .star.on { color:var(--accent); }
    .star.on .star-ic { fill:var(--accent); }
    .ban:hover { color:var(--cn); }

    .sk { padding:16px 4px; border-bottom:1px solid var(--line); display:grid; grid-template-columns:44px 1fr; gap:16px; align-items:center; }
    .sk-box { background:linear-gradient(90deg,var(--line) 25%,var(--surface-2) 37%,var(--line) 63%); background-size:400% 100%; animation:sh 1.4s ease infinite; border-radius:8px; }
    .sk-mono { width:44px; height:44px; border-radius:8px; }
    .sk-l1 { height:14px; width:60%; margin-bottom:8px; }
    .sk-l2 { height:11px; width:35%; }
    @keyframes sh { 0%{background-position:100% 0} 100%{background-position:0 0} }

    .empty { display:none; text-align:center; padding:80px 20px; color:var(--ink-faint); }
    .empty.show { display:block; }
    .empty .big { font-family:var(--serif); font-size:20px; color:var(--ink-soft); margin-bottom:8px; }

    .totop { position:fixed; right:22px; bottom:22px; width:42px; height:42px; border-radius:50%; background:linear-gradient(180deg,var(--navy-2),var(--navy)); color:var(--surface); border:0; cursor:pointer; display:grid; place-items:center; opacity:0; pointer-events:none; transform:translateY(8px); transition:all .25s; box-shadow:var(--shadow); z-index:30; }
    .totop.show { opacity:1; pointer-events:auto; transform:none; }

    body.compact .job { padding:11px 4px; }
    body.compact .job-title { font-size:14.5px; }
    body.compact .mono { width:38px; height:38px; font-size:15px; }
    body.compact .day { margin-top:22px; }

    @media (max-width:720px) {
      .shell { padding:0 16px 56px; }
      .masthead { padding:34px 0 20px; }
      .masthead h1 { font-size:26px; }
      .masthead .lede { font-size:14px; }
      .theme-toggle { top:26px; right:0; width:32px; height:32px; }
      .stats { grid-template-columns:repeat(2,1fr); margin-top:22px; }
      .stat { padding:14px; }
      .stat .v { font-size:20px; }
      .analytics { grid-template-columns:1fr; }
      .toolbar { padding:10px 0; }
      .toolbar-inner { gap:8px; }
      .search { flex:1 1 100%; min-width:0; }
      .search .s-key { display:none; }
      .segmented { width:100%; }
      .seg { flex:1; text-align:center; padding:8px 4px; }
      select.ctrl { flex:1 1 calc(50% - 4px); min-width:0; max-width:none; width:100%; overflow:hidden; text-overflow:ellipsis; }
      .pill { flex:1 1 calc(50% - 4px); justify-content:center; padding:10px; }
      .count { margin-left:0; width:100%; text-align:right; }
      .job { grid-template-columns:38px 1fr; gap:12px; padding:14px 2px; }
      .mono { width:38px; height:38px; font-size:15px; }
      .job-title { font-size:15px; }
      .job-sub { white-space:normal; }
      .job-right { grid-column:2; justify-content:flex-start; margin-top:6px; flex-wrap:wrap; gap:8px; }
    }
    @media (max-width:420px) {
      .masthead h1 { font-size:22px; }
      .day-head { flex-wrap:wrap; gap:6px 10px; }
      .seg { font-size:12px; padding:8px 2px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <button class="theme-toggle" id="themeToggle" aria-label="切换深浅主题"></button>
      <p class="eyebrow reveal">Finance Careers · CN / HK / SG</p>
      <h1 class="reveal" style="animation-delay:.05s">LinkedIn 金融职位精选</h1>
      <p class="lede reveal" style="animation-delay:.1s">聚合自 LinkedIn 的金融行业最新职位，覆盖中国大陆、香港与新加坡市场，每 6 小时自动更新一次。</p>
      <p class="tagline reveal" style="animation-delay:.15s">祝我们都能拿到 dream offer 👏</p>

      <div class="stats reveal" style="animation-delay:.2s">
        <div class="stat"><p class="k">职位总数</p><p class="v" id="stat-total">—</p></div>
        <div class="stat"><p class="k">覆盖机构</p><p class="v" id="stat-comp">—</p></div>
        <div class="stat"><p class="k"><span class="live"></span>最近更新</p><p class="v" id="stat-updated" style="white-space:nowrap">—</p></div>
        <div class="stat"><p class="k">访客总数 (PV)</p><p class="v"><span id="busuanzi_container_site_pv"><span id="busuanzi_value_site_pv">—</span></span></p></div>
      </div>

      <div class="analytics reveal" style="animation-delay:.26s">
        <div class="card"><h3>地区分布</h3><div id="dist"></div></div>
        <div class="card"><h3>近 7 日新增</h3><div class="spark" id="spark"></div></div>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="search">
          <svg class="s-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="搜索职位或机构…" autocomplete="off" />
          <span class="s-key">/</span>
        </div>
        <div class="segmented" id="regions">
          <button class="seg active" data-region="all">全部</button>
          <button class="seg" data-region="CN">CN</button>
          <button class="seg" data-region="HK">HK</button>
          <button class="seg" data-region="SG">SG</button>
          <button class="seg" data-region="OTHER">其他</button>
        </div>
        <select class="ctrl" id="level">
          <option value="all">全部职级</option>
          <option value="Intern">实习 Intern</option>
          <option value="Analyst">Analyst</option>
          <option value="Associate">Associate</option>
          <option value="VP">VP</option>
          <option value="Director+">Director+</option>
          <option value="Other">其他</option>
        </select>
        <select class="ctrl" id="company"><option value="all">全部机构</option></select>
        <button class="pill" id="favToggle" aria-label="只看收藏"></button>
        <button class="pill" id="densityToggle" aria-label="切换列表密度"></button>
        <span class="count tnum" id="count"></span>
      </div>
      <div class="blocked-bar" id="blockedBar"></div>
    </div>

    <main id="jobs"></main>
    <div class="empty" id="empty"><div class="big">未找到匹配的职位</div><div>试试调整筛选条件或清空搜索关键词。</div></div>

    <footer class="footer">
      <span>数据来源：LinkedIn · 每 6 小时自动同步</span>
      <a href="https://linkedin.claudecowork.workers.dev/">linkedin.claudecowork.workers.dev</a>
    </footer>
  </div>

  <button class="totop" id="totop" aria-label="回到顶部"></button>

  <script>
    const IC = {
      star:'<svg class="star-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2.6 15.09 8.86 22 9.87 17 14.74 18.18 21.62 12 18.37 5.82 21.62 7 14.74 2 9.87 8.91 8.86 12 2.6"/></svg>',
      ban:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/></svg>',
      x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
      chevron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
      up:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>',
      rows:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>'
    };
    const SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
    const MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';

    const tbtn = document.getElementById('themeToggle');
    function setTheme(t){ document.documentElement.setAttribute('data-theme', t); tbtn.innerHTML = t === 'dark' ? SUN : MOON; localStorage.setItem('theme', t); }
    setTheme(localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
    tbtn.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    document.getElementById('totop').innerHTML = IC.up;
    document.getElementById('favToggle').innerHTML = IC.star + '<span>收藏</span>';
    const dbtn = document.getElementById('densityToggle');
    dbtn.innerHTML = IC.rows + '<span>紧凑</span>';

    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(!reduce) document.body.classList.add('anim');

    const REGIONS = { CN:{label:"中国大陆"}, HK:{label:"香港"}, SG:{label:"新加坡"}, OTHER:{label:"其他"} };
    const norm = loc => { const u=(loc||"OTHER").toUpperCase(); return REGIONS[u]?u:"OTHER"; };
    const esc = s => String(s==null?"":s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    const monogram = n => { const t=(n||"?").trim(); return t?t[0].toUpperCase():"?"; };
    const keyOf = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const dayKey = iso => { const d=new Date(iso); return isNaN(d)?"—":keyOf(d); };
    const dayLabel = iso => { const d=new Date(iso); return isNaN(d)?"未知日期":d.toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"}); };

    function levelOf(title){ const t=(title||"").toLowerCase(); if(/\bintern(s|ship)?\b/.test(t)||/实习/.test(t))return "Intern"; if(/\b(md|managing director|director|head of)\b/.test(t)||/总监|主管/.test(t))return "Director+"; if(/\b(vp|svp|evp|vice president)\b/.test(t)||/副总裁/.test(t))return "VP"; if(/associate/.test(t)||/经理/.test(t))return "Associate"; if(/analyst/.test(t)||/分析师|专员/.test(t))return "Analyst"; return "Other"; }

    function animNum(el, target, suffix){ suffix=suffix||""; if(reduce){ el.innerHTML=target.toLocaleString()+suffix; return; } const dur=900, start=performance.now(); const step=now=>{ const p=Math.min((now-start)/dur,1), e=1-Math.pow(1-p,3); el.innerHTML=Math.round(target*e).toLocaleString()+suffix; if(p<1)requestAnimationFrame(step); }; requestAnimationFrame(step); }

    const favs = new Set(JSON.parse(localStorage.getItem("favs")||"[]"));
    const reads = new Set(JSON.parse(localStorage.getItem("reads")||"[]"));
    const blocked = new Set(JSON.parse(localStorage.getItem("blocked")||"[]"));
    const saveFavs = () => localStorage.setItem("favs", JSON.stringify([...favs]));
    const saveReads = () => localStorage.setItem("reads", JSON.stringify([...reads]));
    const saveBlocked = () => localStorage.setItem("blocked", JSON.stringify([...blocked]));

    const jobsEl=document.getElementById("jobs");
    const emptyEl=document.getElementById("empty");
    const searchEl=document.getElementById("search");
    const companyEl=document.getElementById("company");
    const levelEl=document.getElementById("level");
    const regionsEl=document.getElementById("regions");
    const favEl=document.getElementById("favToggle");
    const countEl=document.getElementById("count");
    const blockedBar=document.getElementById("blockedBar");
    let activeRegion="all", favOnly=false, blockedOpen=false;

    function setDensity(d){ const c=d==="compact"; document.body.classList.toggle("compact",c); dbtn.classList.toggle("active",c); localStorage.setItem("density",d); }
    setDensity(localStorage.getItem("density")||"comfortable");
    dbtn.addEventListener("click",()=>setDensity(document.body.classList.contains("compact")?"comfortable":"compact"));

    function renderBlocked(){
      if(blocked.size===0){ blockedBar.classList.remove("show","open"); blockedBar.innerHTML=""; blockedOpen=false; return; }
      blockedBar.classList.add("show");
      blockedBar.classList.toggle("open", blockedOpen);
      blockedBar.innerHTML='<button class="bl-toggle" id="blToggle">已屏蔽机构 ('+blocked.size+') <span class="bl-caret">'+IC.chevron+'</span></button>'
        +'<div class="bl-list">'+[...blocked].map(c=>'<span class="bl-chip">'+esc(c)+'<button data-c="'+esc(c)+'" aria-label="取消屏蔽">'+IC.x+'</button></span>').join("")+'<button class="bl-clear" id="blClear">全部清除</button></div>';
    }
    blockedBar.addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b)return; if(b.id==="blToggle"){ blockedOpen=!blockedOpen; blockedBar.classList.toggle("open",blockedOpen); return; } if(b.id==="blClear"){ blocked.clear(); } else if(b.dataset.c!=null){ blocked.delete(b.dataset.c); } saveBlocked(); renderBlocked(); apply(); });
    renderBlocked();

    jobsEl.innerHTML = Array.from({length:6}).map(()=>'<div class="sk"><div class="sk-box sk-mono"></div><div><div class="sk-box sk-l1"></div><div class="sk-box sk-l2"></div></div></div>').join("");

    fetch("jobs.json?_="+Date.now())
      .then(r=>r.json())
      .then(data=>{
        if(!Array.isArray(data)) data=[];
        jobsEl.innerHTML="";

        animNum(document.getElementById("stat-total"), data.length);
        const companies=[...new Set(data.map(j=>j.company).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"zh-Hans-CN"));
        animNum(document.getElementById("stat-comp"), companies.length);
        if(data[0]&&data[0].pushTime){ const d=new Date(data[0].pushTime); if(!isNaN(d)) document.getElementById("stat-updated").innerHTML='<span style="font-size:17px">'+d.toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})+'</span>'; }
        companies.forEach(c=>{ const o=document.createElement("option"); o.value=c; o.textContent=c; companyEl.appendChild(o); });

        const rc={CN:0,HK:0,SG:0,OTHER:0}; data.forEach(j=>rc[norm(j.location)]++);
        const rmax=Math.max(...Object.values(rc),1);
        const distEl=document.getElementById("dist");
        distEl.innerHTML=Object.keys(rc).filter(k=>rc[k]>0).map(k=>{ const pct=data.length?Math.round(rc[k]/data.length*100):0; return '<div class="dist-row" data-region="'+k+'"><span class="dist-label">'+REGIONS[k].label+'</span><div class="dist-track"><div class="dist-fill" data-w="'+(rc[k]/rmax*100)+'"></div></div><span class="dist-val tnum">'+rc[k]+'<small>'+pct+'%</small></span></div>'; }).join("");
        requestAnimationFrame(()=>distEl.querySelectorAll(".dist-fill").forEach(f=>{ f.style.width=f.dataset.w+"%"; }));

        const counts={}; data.forEach(j=>{ const k=dayKey(j.pushTime); counts[k]=(counts[k]||0)+1; });
        const today=new Date(); const days=[];
        for(let i=6;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); days.push({label:d.toLocaleDateString("en-US",{weekday:"short"}),count:counts[keyOf(d)]||0}); }
        const smax=Math.max(...days.map(d=>d.count),1);
        const sparkEl=document.getElementById("spark");
        sparkEl.innerHTML=days.map(d=>'<div class="spark-col"><div class="spark-bar" data-h="'+(d.count/smax*100)+'">'+(d.count?'<span>'+d.count+'</span>':'')+'</div><span class="spark-label">'+d.label+'</span></div>').join("");
        requestAnimationFrame(()=>sparkEl.querySelectorAll(".spark-bar").forEach(b=>{ b.style.height=b.dataset.h+"%"; }));

        const groups=new Map();
        data.forEach(j=>{ const k=dayKey(j.pushTime); if(!groups.has(k)) groups.set(k,{label:dayLabel(j.pushTime),items:[]}); groups.get(k).items.push(j); });
        let first=true;
        for(const [,g] of groups){
          const sec=document.createElement("section"); sec.className="day";
          const head=document.createElement("div"); head.className="day-head";
          head.innerHTML='<span class="day-date">'+esc(g.label)+'</span><span class="day-meta tnum" data-role="daycount">'+g.items.length+' 个职位</span>'+(first?'<span class="day-new">Latest</span>':'');
          sec.appendChild(head);
          g.items.forEach((job,idx)=>{
            const r=norm(job.location), lvl=levelOf(job.title), id=job.link||(job.title+"|"+job.company);
            const a=document.createElement("article"); a.className="job"+(reads.has(id)?" read":"");
            if(first&&!reduce) a.style.animationDelay=Math.min(idx*0.03,0.45)+"s";
            a.dataset.region=r; a.dataset.comp=job.company||""; a.dataset.level=lvl; a.dataset.id=id;
            a.dataset.search=((job.title||"")+" "+(job.company||"")).toLowerCase();
            a.innerHTML='<div class="mono">'+esc(monogram(job.company))+'</div>'+'<div class="job-main"><a class="job-title" href="'+esc(job.link)+'" target="_blank" rel="noopener">'+esc(job.title)+'</a>'+'<div class="job-sub">'+esc(job.company||"未知机构")+'</div></div>'+'<div class="job-right">'+(lvl!=="Other"?'<span class="lvl">'+lvl+'</span>':'')+'<span class="tag">'+r+'</span>'+'<button class="icon-btn star'+(favs.has(id)?" on":"")+'" aria-label="收藏">'+IC.star+'</button>'+'<button class="icon-btn ban" aria-label="不再显示该公司">'+IC.ban+'</button></div>';
            a.querySelector(".job-title").addEventListener("click",()=>{ reads.add(id); saveReads(); a.classList.add("read"); });
            const star=a.querySelector(".star");
            star.addEventListener("click",e=>{ e.preventDefault(); if(favs.has(id)){favs.delete(id);star.classList.remove("on");}else{favs.add(id);star.classList.add("on");} saveFavs(); if(favOnly) apply(); });
            const ban=a.querySelector(".ban");
            ban.addEventListener("click",e=>{ e.preventDefault(); const c=job.company; if(c){ blocked.add(c); saveBlocked(); renderBlocked(); apply(); } });
            sec.appendChild(a);
          });
          jobsEl.appendChild(sec); first=false;
        }

        regionsEl.addEventListener("click",e=>{ const b=e.target.closest(".seg"); if(!b)return; regionsEl.querySelectorAll(".seg").forEach(x=>x.classList.remove("active")); b.classList.add("active"); activeRegion=b.dataset.region; apply(); });
        favEl.addEventListener("click",()=>{ favOnly=!favOnly; favEl.classList.toggle("active",favOnly); apply(); });
        searchEl.addEventListener("input",apply);
        companyEl.addEventListener("change",apply);
        levelEl.addEventListener("change",apply);
        apply();
      })
      .catch(()=>{ jobsEl.innerHTML=""; emptyEl.classList.add("show"); emptyEl.querySelector(".big").textContent="职位数据加载失败"; });

    function apply(){
      const q=searchEl.value.trim().toLowerCase(), comp=companyEl.value, lv=levelEl.value;
      let visible=0;
      jobsEl.querySelectorAll(".day").forEach(sec=>{
        let shown=0;
        sec.querySelectorAll(".job").forEach(card=>{
          const ok=!blocked.has(card.dataset.comp)&&(activeRegion==="all"||card.dataset.region===activeRegion)&&(comp==="all"||card.dataset.comp===comp)&&(lv==="all"||card.dataset.level===lv)&&(!favOnly||favs.has(card.dataset.id))&&(!q||card.dataset.search.includes(q));
          card.classList.toggle("hidden",!ok); if(ok)shown++;
        });
        const c=sec.querySelector('[data-role="daycount"]'); if(c)c.textContent=shown+" 个职位";
        sec.style.display=shown?"":"none"; visible+=shown;
      });
      countEl.innerHTML="显示 <b>"+visible+"</b> 个职位";
      emptyEl.classList.toggle("show",visible===0);
    }

    document.addEventListener("keydown",e=>{
      const tag=(e.target.tagName||"").toLowerCase();
      if(tag==="input"||tag==="select"||tag==="textarea")return;
      if(e.key==="/"){ e.preventDefault(); searchEl.focus(); }
      else if(e.key.toLowerCase()==="t"){ setTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"); }
    });

    const totop=document.getElementById("totop");
    addEventListener("scroll",()=>{ totop.classList.toggle("show", window.scrollY>600); },{passive:true});
    totop.addEventListener("click",()=>scrollTo({top:0,behavior:"smooth"}));
  </script>
</body>
</html>
