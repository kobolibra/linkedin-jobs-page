<html lang="zh-CN">
<head>

  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  <style>
    :root {
      --bg: #f5f2eb;
      --surface: #ffffff;
      --surface-2: #eeebe2;
      --ink: #0c1a2b;
      --ink-soft: #4b5a6e;
      --ink-faint: #8a96a5;
      --line: #e2ddd2;
      --line-strong: #cac4b6;
      --accent: #b89b66;
      --accent-2: #806238;
      --accent-soft: #ede4d1;
      --navy: #0c1f36;
      --navy-2: #1b3a5c;
      --navy-3: #2e5478;
      --gold: #b89b66;
      --gold-hi: #d4b882;
      --gold-deep: #806238;
      --ember: #b55a3c;
      --cn: #8f4a3e; --cn-bg: #faf0ee;
      --hk: #7a6530; --hk-bg: #faf5e8;
      --sg: #356b52; --sg-bg: #edf5f0;
      --other: #4a5f78; --other-bg: #eef2f7;
      --serif: Georgia, "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Roboto, Helvetica, Arial, sans-serif;
      --mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
      --shadow: 0 1px 2px rgba(12,26,43,.05), 0 4px 16px rgba(12,26,43,.06);
      --shadow-strong: 0 2px 4px rgba(12,26,43,.07), 0 12px 32px rgba(12,26,43,.09);
      --radius: 10px;
    }
    [data-theme="dark"] {
      --bg: #06101b;
      --surface: #0d1a28;
      --surface-2: #0a1420;
      --ink: #edeae2;
      --ink-soft: #a8b4c0;
      --ink-faint: #60717f;
      --line: #1e2f3f;
      --line-strong: #2d4155;
      --accent: #c9ad78;
      --accent-2: #d8c293;
      --accent-soft: rgba(201,173,120,.13);
      --navy: #edeae2;
      --navy-2: #9db4c8;
      --navy-3: #c1d0de;
      --gold: #c9ad78;
      --gold-hi: #e4d0a0;
      --gold-deep: #a08050;
      --ember: #c7795f;
      --cn: #c98778; --cn-bg: rgba(201,135,120,.11);
      --hk: #cab37c; --hk-bg: rgba(202,179,124,.11);
      --sg: #83bea3; --sg-bg: rgba(131,190,163,.11);
      --other: #9ab0c7; --other-bg: rgba(154,176,199,.12);
      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 6px 20px rgba(0,0,0,.35);
      --shadow-strong: 0 2px 6px rgba(0,0,0,.5), 0 14px 36px rgba(0,0,0,.45);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      line-height: 1.6;
      font-size: 15px;
      transition: background .3s, color .3s;
    }
    .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
    .shell { max-width: 1100px; margin: 0 auto; padding: 0 32px 96px; }

    [data-region="CN"] { --region: var(--cn); --region-bg: var(--cn-bg); }
    [data-region="HK"] { --region: var(--hk); --region-bg: var(--hk-bg); }
    [data-region="SG"] { --region: var(--sg); --region-bg: var(--sg-bg); }
    [data-region="OTHER"] { --region: var(--other); --region-bg: var(--other-bg); }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 5px; }
    button:focus:not(:focus-visible), input:focus:not(:focus-visible), select:focus:not(:focus-visible) { outline: none; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.78)} }
    @keyframes sh { 0%{background-position:100% 0} 100%{background-position:0 0} }

    .live {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #1f9d55;
      margin-right: 6px; vertical-align: middle;
      box-shadow: 0 0 0 3px color-mix(in srgb,#1f9d55 22%,transparent);
    }
    @media (prefers-reduced-motion: no-preference) {
      body.anim .reveal { opacity: 0; animation: fadeUp .65s cubic-bezier(.2,.8,.2,1) forwards; }
      body.anim .job { animation: fadeUp .45s both; }
      .live { animation: pulse 1.8s ease-in-out infinite; }
    }

    /* ── MASTHEAD ── */
    .masthead {
      position: relative;
      padding: 52px 0 32px;
      border-bottom: 1px solid var(--line-strong);
    }
    .masthead::before {
      content: "";
      position: absolute; left: 0; right: 0; top: 0; height: 3px;
      background: linear-gradient(90deg, var(--navy), var(--navy-2) 55%, var(--gold));
    }
    .eyebrow {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--gold-deep);
      font-weight: 700;
      margin: 0 0 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    [data-theme="dark"] .eyebrow { color: var(--gold); }
    .eyebrow::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--line-strong), transparent);
    }
    .masthead-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 24px;
    }
    .masthead h1 {
      font-family: var(--serif);
      font-weight: 700;
      font-size: 46px;
      line-height: 1.06;
      letter-spacing: -.04em;
      margin: 0 0 16px;
      color: var(--navy);
    }
    .masthead .lede {
      margin: 0 0 10px;
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.6;
      max-width: 560px;
    }
    .masthead .tagline {
      margin: 0;
      font-family: var(--serif);
      font-style: italic;
      font-size: 13.5px;
      color: var(--ink-faint);
    }
    .masthead-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      padding-top: 4px;
    }
    .theme-toggle {
      display: flex; align-items: center; gap: 8px;
      background: none; border: 0; padding: 0; cursor: pointer;
    }
    .theme-toggle .tt-ic { display: grid; place-items: center; color: var(--ink-faint); transition: color .3s, transform .3s; }
    .theme-toggle .tt-ic svg { width: 17px; height: 17px; display: block; }
    .theme-toggle .tt-track {
      position: relative; width: 34px; height: 19px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--line-strong);
      transition: background .22s, border-color .22s;
    }
    .theme-toggle:hover .tt-track { border-color: var(--accent); }
    .theme-toggle .tt-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 13px; height: 13px; border-radius: 50%;
      background: linear-gradient(180deg, var(--navy-2), var(--navy));
      box-shadow: 0 1px 3px rgba(12,26,43,.3);
      transition: transform .45s cubic-bezier(.34,1.4,.5,1);
    }
    .theme-toggle[data-mode="dark"] .tt-thumb { transform: translateX(15px); }
    .theme-toggle[data-mode="light"] .tt-sun { color: var(--accent-2); transform: scale(1.1); }
    .theme-toggle[data-mode="dark"] .tt-moon { color: var(--accent); transform: scale(1.1); }

    /* keep mast-photo in DOM for JS but hide it */
    .mast-photo { display: none !important; }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 28px 0 0;
      position: relative;
    }
    .stats::before {
      content: "";
      position: absolute; left: 0; right: 0; top: 0; height: 2px;
      background: linear-gradient(90deg, var(--navy), var(--gold));
    }
    .stat {
      padding: 20px 22px 18px;
      border-right: 1px solid var(--line);
    }
    .stat:last-child { border-right: 0; }
    .stat .k {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 0 0 8px;
      font-weight: 600;
    }
    .stat .v {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -.03em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .stat .v small { font-size: 12px; color: var(--ink-faint); font-weight: 400; margin-left: 3px; }
    [data-theme="dark"] .stat .v { text-shadow: 0 0 24px color-mix(in srgb, var(--accent) 14%, transparent); }

    /* ── ANALYTICS CARDS ── */
    .analytics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 20px 24px;
      transition: border-color .18s, box-shadow .18s;
    }
    .card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
    .card h3 {
      margin: 0 0 16px;
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      font-weight: 700;
    }
    .dist-row {
      display: grid;
      grid-template-columns: 72px 1fr 52px;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .dist-row:last-child { margin-bottom: 0; }
    .dist-label { font-size: 13px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dist-track {
      height: 5px;
      background: var(--surface-2);
      border-radius: 999px;
      overflow: hidden;
    }
    .dist-fill {
      width: 0; height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--region, var(--other)), color-mix(in srgb, var(--region, var(--other)) 50%, transparent));
      transition: width .7s cubic-bezier(.2,.8,.2,1);
    }
    .dist-val {
      font-family: var(--mono); font-size: 12.5px;
      color: var(--navy); text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .dist-val small { display: block; font-size: 10px; color: var(--ink-faint); font-weight: 400; margin-top: 1px; }

    .spark {
      display: flex;
      align-items: flex-end;
      gap: 9px;
      height: 96px;
      padding: 8px 2px 0;
      position: relative;
    }
    .spark::after {
      content: "";
      position: absolute; left: 0; right: 0; bottom: 20px;
      height: 1px; background: var(--line);
    }
    .spark-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 5px; height: 100%;
      justify-content: flex-end; position: relative;
    }
    .spark-bar {
      width: 100%; max-width: 24px; height: 0;
      background: linear-gradient(to top, var(--navy-2), color-mix(in srgb, var(--navy-2) 48%, transparent));
      border-radius: 4px 4px 0 0;
      min-height: 3px;
      transition: height .65s cubic-bezier(.2,.8,.2,1);
      position: relative; z-index: 1;
    }
    .spark-bar span {
      position: absolute; top: -17px; left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono); font-size: 10.5px;
      color: var(--navy); font-variant-numeric: tabular-nums;
    }
    .spark-label {
      position: relative; z-index: 1;
      font-family: var(--mono); font-size: 10px;
      color: var(--ink-faint);
    }

    [data-theme="dark"] .card { background: var(--surface); }
    [data-theme="dark"] .stat { background: var(--surface); }
    [data-theme="dark"] .spark-bar { background: linear-gradient(to top, var(--navy-2), color-mix(in srgb, var(--navy-2) 42%, transparent)); }

    /* ── TOOLBAR ── */
    .toolbar {
      position: sticky; top: 0; z-index: 20;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      border-bottom: 1px solid var(--line-strong);
      margin: 32px 0 0;
      padding: 12px 0;
    }
    .toolbar-inner {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .search {
      position: relative; flex: 1 1 220px; min-width: 180px;
    }
    .search input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      font-size: 13.5px; color: var(--ink);
      font-family: var(--sans);
      transition: border-color .15s, box-shadow .15s;
    }
    .search input::placeholder { color: var(--ink-faint); }
    .search input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }
    .search .s-ic {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      color: var(--ink-faint); pointer-events: none;
    }
    .search .s-key {
      position: absolute; right: 9px; top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono); font-size: 10.5px;
      color: var(--ink-faint);
      border: 1px solid var(--line-strong);
      border-radius: 4px; padding: 1px 5px;
      background: var(--surface-2); pointer-events: none;
    }
    .segmented {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 3px; gap: 2px;
    }
    .seg {
      border: 0; background: transparent;
      font-family: var(--sans); font-size: 12.5px;
      color: var(--ink-soft);
      padding: 5px 11px; border-radius: 5px;
      cursor: pointer; transition: all .12s; white-space: nowrap;
    }
    .seg:hover { color: var(--ink); background: var(--surface-2); }
    .seg.active {
      background: var(--navy);
      color: #fff; font-weight: 600;
    }
    [data-theme="dark"] .seg.active { background: color-mix(in srgb, var(--gold) 18%, var(--surface-2)); color: var(--gold-hi); }
    select.ctrl {
      padding: 8px 11px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      font-size: 13px; color: var(--ink);
      font-family: var(--sans);
      max-width: 180px; cursor: pointer;
      transition: border-color .15s;
    }
    select.ctrl:focus { outline: none; border-color: var(--accent); }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 11px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      font-size: 12.5px; color: var(--ink-soft);
      cursor: pointer; font-family: var(--sans);
      transition: all .12s;
    }
    .pill svg { width: 14px; height: 14px; }
    .pill:hover { color: var(--ink); border-color: var(--accent); }
    .pill.active {
      color: var(--accent-2);
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
    }
    .pill.active .star-ic { fill: var(--accent); }
    .count {
      margin-left: auto;
      font-size: 12.5px; color: var(--ink-faint);
      font-family: var(--mono); white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .count b { color: var(--navy); }

    /* ── BLOCKED BAR ── */
    .blocked-bar { display: none; flex-wrap: wrap; align-items: center; gap: 8px; padding: 10px 2px 0; }
    .blocked-bar.show { display: flex; }
    .bl-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
      font-weight: 700; color: var(--ink-faint);
      background: transparent; border: 0; cursor: pointer; padding: 0;
      font-family: var(--mono);
    }
    .bl-toggle:hover { color: var(--accent); }
    .bl-caret { display: inline-flex; transition: transform .18s; }
    .bl-caret svg { width: 12px; height: 12px; }
    .blocked-bar.open .bl-caret { transform: rotate(180deg); }
    .bl-list { display: none; flex-wrap: wrap; align-items: center; gap: 7px; width: 100%; }
    .blocked-bar.open .bl-list { display: flex; }
    .bl-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11.5px; color: var(--ink-soft);
      background: var(--surface); border: 1px solid var(--line-strong);
      border-radius: 999px; padding: 3px 4px 3px 10px;
    }
    .bl-chip button {
      border: 0; background: transparent; cursor: pointer;
      color: var(--ink-faint); display: grid; place-items: center;
      padding: 2px; border-radius: 50%; transition: color .12s;
    }
    .bl-chip button svg { width: 12px; height: 12px; }
    .bl-chip button:hover { color: var(--cn); }
    .bl-clear {
      font-size: 11.5px; color: var(--ink-faint);
      background: transparent; border: 0; cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .bl-clear:hover { color: var(--accent); }

    /* ── DAY SECTIONS ── */
    .day { margin-top: 40px; }
    .day-head {
      display: flex; align-items: baseline; gap: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line-strong);
      margin-bottom: 2px;
    }
    .day-date {
      font-family: var(--serif);
      font-size: 19px; font-weight: 700;
      color: var(--navy); letter-spacing: -.02em;
    }
    .day-meta {
      font-size: 11.5px; color: var(--ink-faint);
      font-family: var(--mono); font-variant-numeric: tabular-nums;
    }
    .day-new {
      font-family: var(--mono);
      font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--accent-2);
      border: 1px solid color-mix(in srgb, var(--accent) 60%, transparent);
      border-radius: 999px; padding: 2px 8px;
      font-weight: 700;
      background: color-mix(in srgb, var(--accent) 7%, transparent);
    }

    /* ── JOB ROWS ── */
    .job {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 15px 4px;
      border-bottom: 1px solid var(--line);
      position: relative;
      transition: background .12s;
    }
    .job::before {
      content: "";
      position: absolute; left: -4px; top: 10px; bottom: 10px;
      width: 3px; border-radius: 3px;
      background: var(--region, var(--line-strong));
      opacity: 0;
      transition: opacity .12s;
    }
    .job:last-child { border-bottom: 0; }
    .job:hover {
      background: color-mix(in srgb, var(--surface) 80%, transparent);
      border-radius: 8px;
    }
    .job:hover::before { opacity: 1; }
    .job.hidden { display: none; }
    .job.read .job-title { color: var(--ink-faint); }
    .job.read .mono { opacity: .5; }

    .mono {
      width: 42px; height: 42px;
      border-radius: 8px;
      display: grid; place-items: center;
      font-family: var(--serif); font-weight: 700; font-size: 16px;
      color: var(--region, var(--navy));
      background: var(--region-bg, var(--surface-2));
      border: 1px solid color-mix(in srgb, var(--region, var(--line-strong)) 20%, transparent);
      user-select: none;
      flex-shrink: 0;
    }
    .job-main { min-width: 0; }
    .job-title {
      font-size: 15px; font-weight: 650;
      color: var(--ink); text-decoration: none;
      line-height: 1.35; letter-spacing: -.008em;
      display: block;
    }
    .job-title:hover { color: var(--accent-2); text-decoration: underline; text-underline-offset: 3px; }
    .job-sub {
      font-size: 12.5px; color: var(--ink-soft);
      margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .job-right {
      display: flex; align-items: center; gap: 7px;
    }
    .lvl {
      font-size: 10.5px; font-weight: 650;
      color: var(--ink-soft);
      background: var(--surface-2);
      border: 1px solid var(--line);
      padding: 3px 7px; border-radius: 5px;
      white-space: nowrap;
    }
    .tag {
      font-size: 10.5px; font-weight: 700;
      letter-spacing: .06em;
      padding: 3px 9px; border-radius: 999px;
      color: var(--region, var(--other));
      background: var(--region-bg, var(--other-bg));
      white-space: nowrap;
    }
    .icon-btn {
      width: 28px; height: 28px;
      display: grid; place-items: center;
      border: 0; background: transparent;
      cursor: pointer; color: var(--ink-faint);
      border-radius: 6px; transition: all .12s;
    }
    .icon-btn svg { width: 16px; height: 16px; }
    .icon-btn:hover { color: var(--ink); background: var(--surface-2); }
    .star.on { color: var(--accent); }
    .star.on .star-ic { fill: var(--accent); }
    .ban:hover { color: var(--cn); }

    /* ── SKELETON ── */
    .sk {
      padding: 15px 4px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 14px; align-items: center;
    }
    .sk-box {
      background: linear-gradient(90deg, var(--line) 25%, var(--surface-2) 37%, var(--line) 63%);
      background-size: 400% 100%;
      animation: sh 1.4s ease infinite;
      border-radius: 6px;
    }
    .sk-mono { width: 42px; height: 42px; border-radius: 8px; }
    .sk-l1 { height: 13px; width: 58%; margin-bottom: 8px; }
    .sk-l2 { height: 11px; width: 33%; }

    /* ── EMPTY STATE ── */
    .empty { display: none; text-align: center; padding: 80px 20px; color: var(--ink-faint); }
    .empty.show { display: block; }
    .empty .big {
      font-family: var(--serif); font-size: 19px;
      color: var(--ink-soft); margin-bottom: 8px;
    }

    /* ── COMPACT MODE ── */
    body.compact .job { padding: 10px 4px; }
    body.compact .job-title { font-size: 14px; }
    body.compact .mono { width: 36px; height: 36px; font-size: 14px; }
    body.compact .day { margin-top: 26px; }

    /* ── BACK TO TOP ── */
    .totop {
      position: fixed; right: 20px; bottom: 20px;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--navy);
      color: #fff; border: 0;
      cursor: pointer; display: grid; place-items: center;
      opacity: 0; pointer-events: none;
      transform: translateY(8px);
      transition: all .22s;
      box-shadow: var(--shadow-strong); z-index: 30;
    }
    .totop.show { opacity: 1; pointer-events: auto; transform: none; }
    .totop svg { width: 17px; height: 17px; }
    [data-theme="dark"] .totop { background: color-mix(in srgb, var(--gold) 22%, var(--navy)); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--line-strong);
      font-size: 12px; color: var(--ink-faint);
      display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .footer a { color: var(--ink-soft); text-decoration: none; }
    .footer a:hover { color: var(--accent-2); }
    .footer-divider { color: var(--line-strong); margin: 0 2px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      .shell { padding: 0 18px 64px; }
      .masthead { padding: 38px 0 24px; }
      .masthead-grid { grid-template-columns: 1fr; gap: 16px; }
      .masthead h1 { font-size: 30px; }
      .masthead .lede { font-size: 14px; }
      .masthead-right { flex-direction: row; align-items: center; }
      .stats { grid-template-columns: repeat(2, 1fr); margin-top: 20px; }
      .stat { padding: 14px 16px; }
      .stat .v { font-size: 22px; }
      .analytics { grid-template-columns: 1fr; }
      .toolbar { padding: 10px 0; }
      .toolbar-inner { gap: 8px; }
      .search { flex: 1 1 100%; min-width: 0; }
      .search .s-key { display: none; }
      .segmented { width: 100%; }
      .seg { flex: 1; text-align: center; padding: 7px 4px; }
      select.ctrl { flex: 1 1 calc(50% - 4px); min-width: 0; max-width: none; }
      .pill { flex: 1 1 calc(50% - 4px); justify-content: center; }
      .count { margin-left: 0; width: 100%; text-align: right; }
      .job { grid-template-columns: 36px 1fr; gap: 10px; padding: 13px 2px; }
      .mono { width: 36px; height: 36px; font-size: 14px; }
      .job-title { font-size: 14.5px; }
      .job-sub { white-space: normal; }
      .job-right { grid-column: 2; justify-content: flex-start; margin-top: 5px; flex-wrap: wrap; gap: 6px; }
    }
    @media (max-width: 420px) {
      .masthead h1 { font-size: 24px; }
      .day-head { flex-wrap: wrap; gap: 5px 10px; }
      .seg { font-size: 11.5px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <!-- keep in DOM for JS, hidden via CSS -->
      <div class="mast-photo" id="mastPhoto"><img class="mast-avatar" id="mastAvatar" alt="" /></div>

      <div class="masthead-grid">
        <div class="masthead-copy">
          <p class="eyebrow reveal">Finance Careers &nbsp;·&nbsp; CN&nbsp;/&nbsp;HK&nbsp;/&nbsp;SG</p>
          <h1 class="reveal" style="animation-delay:.05s">LinkedIn 金融职位精选</h1>
          <p class="lede reveal" style="animation-delay:.1s">聚合自 LinkedIn 的金融行业最新职位，覆盖中国大陆、香港与新加坡市场，每 6 小时自动更新。</p>
          <p class="tagline reveal" style="animation-delay:.14s">祝我们都能拿到 dream offer 👏</p>
        </div>
        <div class="masthead-right reveal" style="animation-delay:.08s">
          <button class="theme-toggle" id="themeToggle" role="switch" aria-label="切换深浅主题"></button>
        </div>
      </div>

      <div class="stats reveal" style="animation-delay:.18s">
        <div class="stat"><p class="k">职位总数</p><p class="v" id="stat-total">—</p></div>
        <div class="stat"><p class="k">覆盖机构</p><p class="v" id="stat-comp">—</p></div>
        <div class="stat"><p class="k"><span class="live"></span>最近更新</p><p class="v" id="stat-updated" style="white-space:nowrap">—</p></div>
        <div class="stat"><p class="k">访客总数 (PV)</p><p class="v"><span id="busuanzi_container_site_pv"><span id="busuanzi_value_site_pv">—</span></span></p></div>
      </div>

      <div class="analytics reveal" style="animation-delay:.24s">
        <div class="card"><h3>地区分布</h3><div id="dist"></div></div>
        <div class="card"><h3>近 7 日新增</h3><div class="spark" id="spark"></div></div>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="search">
          <svg class="s-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="搜索职位或机构…" autocomplete="off" />
          <span class="s-key">/</span>
        </div>
        <div class="segmented" id="regions">
          <button class="seg active" data-region="all">全部</button>
          <button class="seg" data-region="CN">CN</button>
          <button class="seg" data-region="HK">HK</button>
          <button class="seg" data-region="SG">SG</button>
          <button class="seg" data-region="OTHER">其他</button>
        </div>
        <select class="ctrl" id="level">
          <option value="all">全部职级</option>
          <option value="Intern">实习 Intern</option>
          <option value="Analyst">Analyst</option>
          <option value="Associate">Associate</option>
          <option value="VP">VP</option>
          <option value="Director+">Director+</option>
          <option value="Other">其他</option>
        </select>
        <select class="ctrl" id="company"><option value="all">全部机构</option></select>
        <button class="pill" id="favToggle" aria-label="只看收藏"></button>
        <button class="pill" id="densityToggle" aria-label="切换列表密度"></button>
        <span class="count tnum" id="count"></span>
      </div>
      <div class="blocked-bar" id="blockedBar"></div>
    </div>

    <main id="jobs"></main>
    <div class="empty" id="empty">
      <div class="big">未找到匹配的职位</div>
      <div>试试调整筛选条件或清空搜索关键词。</div>
    </div>

    <footer class="footer">
      <span>数据来源：LinkedIn<span class="footer-divider">·</span>每 6 小时自动同步</span>
      <a href="https://linkedin.claudecowork.workers.dev/">linkedin.claudecowork.workers.dev</a>
    </footer>
  </div>

  <button class="totop" id="totop" aria-label="回到顶部"></button>

  <script>
    const IC = {
      star:'<svg class="star-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2.6 15.09 8.86 22 9.87 17 14.74 18.18 21.62 12 18.37 5.82 21.62 7 14.74 2 9.87 8.91 8.86 12 2.6"/></svg>',
      ban:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/></svg>',
      x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
      chevron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
      up:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>',
      rows:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>'
    };
    const SUN = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4.6" stroke="none"/><g fill="none"><path d="M12 1.8v2.4M12 19.8v2.4M4.3 4.3l1.7 1.7M18 18l1.7 1.7M1.8 12h2.4M19.8 12h2.4M4.3 19.7l1.7-1.7M18 6l1.7-1.7"/></g></svg>';
    const MOON = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';

    const tbtn = document.getElementById('themeToggle');
    tbtn.innerHTML = '<span class="tt-ic tt-sun">'+SUN+'</span><span class="tt-track"><span class="tt-thumb"></span></span><span class="tt-ic tt-moon">'+MOON+'</span>';
    function setTheme(t){ document.documentElement.setAttribute('data-theme', t); tbtn.setAttribute('data-mode', t); tbtn.setAttribute('aria-checked', t === 'dark' ? 'true' : 'false'); localStorage.setItem('theme', t); }
    setTheme(localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
    tbtn.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    (function(){
      const AVATARS = ["avatars/1.jpg"];
      const el = document.getElementById('mastAvatar');
      const box = document.getElementById('mastPhoto');
      if(!el || !box || !AVATARS.length) return;
      el.src = AVATARS[Math.floor(Math.random()*AVATARS.length)];
    })();

    document.getElementById('totop').innerHTML = IC.up;
    document.getElementById('favToggle').innerHTML = IC.star + '<span>收藏</span>';
    const dbtn = document.getElementById('densityToggle');
    dbtn.innerHTML = IC.rows + '<span>紧凑</span>';

    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(!reduce) document.body.classList.add('anim');

    const REGIONS = { CN:{label:"中国大陆"}, HK:{label:"香港"}, SG:{label:"新加坡"}, OTHER:{label:"其他"} };
    const norm = loc => { const u=(loc||"OTHER").toUpperCase(); return REGIONS[u]?u:"OTHER"; };
    const esc = s => String(s==null?"":s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    const monogram = n => { const t=(n||"?").trim(); return t?t[0].toUpperCase():"?"; };
    const jobId = link => { if(!link) return ""; const path=String(link).split(/[?#]/)[0]; const m=path.match(/(\d{5,})\/?$/)||String(link).match(/[?&]currentJobId=(\d+)/); return m?("ln:"+m[1]):path.replace(/\/+$/,""); };
    const keyOf = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const dayKey = iso => { const d=new Date(iso); return isNaN(d)?"—":keyOf(d); };
    const dayLabel = iso => { const d=new Date(iso); return isNaN(d)?"未知日期":d.toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"}); };

    function levelOf(title){ const t=(title||"").toLowerCase(); if(/\bintern(s|ship)?\b/.test(t)||/实习/.test(t))return "Intern"; if(/\b(md|managing director|director|head of)\b/.test(t)||/总监|主管/.test(t))return "Director+"; if(/\b(vp|svp|evp|vice president)\b/.test(t)||/副总裁/.test(t))return "VP"; if(/associate/.test(t)||/经理/.test(t))return "Associate"; if(/analyst/.test(t)||/分析师|专员/.test(t))return "Analyst"; return "Other"; }

    function animNum(el, target, suffix){ suffix=suffix||""; if(reduce){ el.innerHTML=target.toLocaleString()+suffix; return; } const dur=900, start=performance.now(); const step=now=>{ const p=Math.min((now-start)/dur,1), e=1-Math.pow(1-p,3); el.innerHTML=Math.round(target*e).toLocaleString()+suffix; if(p<1)requestAnimationFrame(step); }; requestAnimationFrame(step); }

    const favs = new Set(JSON.parse(localStorage.getItem("favs")||"[]"));
    const reads = new Set(JSON.parse(localStorage.getItem("reads")||"[]"));
    const blocked = new Set(JSON.parse(localStorage.getItem("blocked")||"[]"));
    const saveFavs = () => localStorage.setItem("favs", JSON.stringify([...favs]));
    const saveReads = () => localStorage.setItem("reads", JSON.stringify([...reads]));
    const saveBlocked = () => localStorage.setItem("blocked", JSON.stringify([...blocked]));
    (function(){ if(localStorage.getItem("favKeyV")==="2") return; [favs,reads].forEach(set=>{ const arr=[...set]; set.clear(); arr.forEach(k=>set.add(jobId(k))); }); saveFavs(); saveReads(); localStorage.setItem("favKeyV","2"); })();

    const jobsEl=document.getElementById("jobs");
    const emptyEl=document.getElementById("empty");
    const searchEl=document.getElementById("search");
    const companyEl=document.getElementById("company");
    const levelEl=document.getElementById("level");
    const regionsEl=document.getElementById("regions");
    const favEl=document.getElementById("favToggle");
    const countEl=document.getElementById("count");
    const blockedBar=document.getElementById("blockedBar");
    let activeRegion="all", favOnly=false, blockedOpen=false;

    function setDensity(d){ const c=d==="compact"; document.body.classList.toggle("compact",c); dbtn.classList.toggle("active",c); localStorage.setItem("density",d); }
    setDensity(localStorage.getItem("density")||"comfortable");
    dbtn.addEventListener("click",()=>setDensity(document.body.classList.contains("compact")?"comfortable":"compact"));

    function renderBlocked(){
      if(blocked.size===0){ blockedBar.classList.remove("show","open"); blockedBar.innerHTML=""; blockedOpen=false; return; }
      blockedBar.classList.add("show");
      blockedBar.classList.toggle("open", blockedOpen);
      blockedBar.innerHTML='<button class="bl-toggle" id="blToggle">已屏蔽机构 ('+blocked.size+') <span class="bl-caret">'+IC.chevron+'</span></button>'
        +'<div class="bl-list">'+[...blocked].map(c=>'<span class="bl-chip">'+esc(c)+'<button data-c="'+esc(c)+'" aria-label="取消屏蔽">'+IC.x+'</button></span>').join("")+'<button class="bl-clear" id="blClear">全部清除</button></div>';
    }
    blockedBar.addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b)return; if(b.id==="blToggle"){ blockedOpen=!blockedOpen; blockedBar.classList.toggle("open",blockedOpen); return; } if(b.id==="blClear"){ blocked.clear(); } else if(b.dataset.c!=null){ blocked.delete(b.dataset.c); } saveBlocked(); renderBlocked(); apply(); });
    renderBlocked();

    jobsEl.innerHTML = Array.from({length:6}).map(()=>'<div class="sk"><div class="sk-box sk-mono"></div><div><div class="sk-box sk-l1"></div><div class="sk-box sk-l2"></div></div></div>').join("");

    fetch("jobs.json?_="+Date.now())
      .then(r=>r.json())
      .then(data=>{
        if(!Array.isArray(data)) data=[];
        jobsEl.innerHTML="";

        animNum(document.getElementById("stat-total"), data.length);
        const companies=[...new Set(data.map(j=>j.company).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"zh-Hans-CN"));
        animNum(document.getElementById("stat-comp"), companies.length);
        if(data[0]&&data[0].pushTime){ const d=new Date(data[0].pushTime); if(!isNaN(d)) document.getElementById("stat-updated").innerHTML='<span style="font-size:17px">'+d.toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})+'</span>'; }
        companies.forEach(c=>{ const o=document.createElement("option"); o.value=c; o.textContent=c; companyEl.appendChild(o); });

        const rc={CN:0,HK:0,SG:0,OTHER:0}; data.forEach(j=>rc[norm(j.location)]++);
        const rmax=Math.max(...Object.values(rc),1);
        const distEl=document.getElementById("dist");
        distEl.innerHTML=Object.keys(rc).filter(k=>rc[k]>0).map(k=>{ const pct=data.length?Math.round(rc[k]/data.length*100):0; return '<div class="dist-row" data-region="'+k+'"><span class="dist-label">'+REGIONS[k].label+'</span><div class="dist-track"><div class="dist-fill" data-w="'+(rc[k]/rmax*100)+'"></div></div><span class="dist-val tnum">'+rc[k]+'<small>'+pct+'%</small></span></div>'; }).join("");
        requestAnimationFrame(()=>distEl.querySelectorAll(".dist-fill").forEach(f=>{ f.style.width=f.dataset.w+"%"; }));

        const counts={}; data.forEach(j=>{ const k=dayKey(j.pushTime); counts[k]=(counts[k]||0)+1; });
        const today=new Date(); const days=[];
        for(let i=6;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); days.push({label:d.toLocaleDateString("en-US",{weekday:"short"}),count:counts[keyOf(d)]||0}); }
        const smax=Math.max(...days.map(d=>d.count),1);
        const sparkEl=document.getElementById("spark");
        sparkEl.innerHTML=days.map(d=>'<div class="spark-col"><div class="spark-bar" data-h="'+(d.count/smax*100)+'">'+(d.count?'<span>'+d.count+'</span>':'')+'</div><span class="spark-label">'+d.label+'</span></div>').join("");
        requestAnimationFrame(()=>sparkEl.querySelectorAll(".spark-bar").forEach(b=>{ b.style.height=b.dataset.h+"%"; }));

        const groups=new Map();
        data.forEach(j=>{ const k=dayKey(j.pushTime); if(!groups.has(k)) groups.set(k,{label:dayLabel(j.pushTime),items:[]}); groups.get(k).items.push(j); });
        let first=true;
        for(const [,g] of groups){
          const sec=document.createElement("section"); sec.className="day";
          const head=document.createElement("div"); head.className="day-head";
          head.innerHTML='<span class="day-date">'+esc(g.label)+'</span><span class="day-meta tnum" data-role="daycount">'+g.items.length+' 个职位</span>'+(first?'<span class="day-new">Latest</span>':'');
          sec.appendChild(head);
          g.items.forEach((job,idx)=>{
            const r=norm(job.location), lvl=levelOf(job.title), id=jobId(job.link)||(job.title+"|"+job.company);
            const a=document.createElement("article"); a.className="job"+(reads.has(id)?" read":"");
            if(first&&!reduce) a.style.animationDelay=Math.min(idx*0.03,0.45)+"s";
            a.dataset.region=r; a.dataset.comp=job.company||""; a.dataset.level=lvl; a.dataset.id=id;
            a.dataset.search=((job.title||"")+" "+(job.company||"")).toLowerCase();
            a.innerHTML='<div class="mono">'+esc(monogram(job.company))+'</div>'+'<div class="job-main"><a class="job-title" href="'+esc(job.link)+'" target="_blank" rel="noopener">'+esc(job.title)+'</a>'+'<div class="job-sub">'+esc(job.company||"未知机构")+'</div></div>'+'<div class="job-right">'+(lvl!=="Other"?'<span class="lvl">'+lvl+'</span>':'')+'<span class="tag">'+r+'</span>'+'<button class="icon-btn star'+(favs.has(id)?" on":"")+'" aria-label="收藏">'+IC.star+'</button>'+'<button class="icon-btn ban" aria-label="不再显示该公司">'+IC.ban+'</button></div>';
            a.querySelector(".job-title").addEventListener("click",()=>{ reads.add(id); saveReads(); a.classList.add("read"); });
            const star=a.querySelector(".star");
            star.addEventListener("click",e=>{ e.preventDefault(); if(favs.has(id)){favs.delete(id);star.classList.remove("on");}else{favs.add(id);star.classList.add("on");} saveFavs(); if(favOnly) apply(); });
            const ban=a.querySelector(".ban");
            ban.addEventListener("click",e=>{ e.preventDefault(); const c=job.company; if(c){ blocked.add(c); saveBlocked(); renderBlocked(); apply(); } });
            sec.appendChild(a);
          });
          jobsEl.appendChild(sec); first=false;
        }

        regionsEl.addEventListener("click",e=>{ const b=e.target.closest(".seg"); if(!b)return; regionsEl.querySelectorAll(".seg").forEach(x=>x.classList.remove("active")); b.classList.add("active"); activeRegion=b.dataset.region; apply(); });
        favEl.addEventListener("click",()=>{ favOnly=!favOnly; favEl.classList.toggle("active",favOnly); apply(); });
        searchEl.addEventListener("input",apply);
        companyEl.addEventListener("change",apply);
        levelEl.addEventListener("change",apply);
        apply();
      })
      .catch(()=>{ jobsEl.innerHTML=""; emptyEl.classList.add("show"); emptyEl.querySelector(".big").textContent="职位数据加载失败"; });

    function apply(){
      const q=searchEl.value.trim().toLowerCase(), comp=companyEl.value, lv=levelEl.value;
      let visible=0;
      jobsEl.querySelectorAll(".day").forEach(sec=>{
        let shown=0;
        sec.querySelectorAll(".job").forEach(card=>{
          const ok=!blocked.has(card.dataset.comp)&&(activeRegion==="all"||card.dataset.region===activeRegion)&&(comp==="all"||card.dataset.comp===comp)&&(lv==="all"||card.dataset.level===lv)&&(!favOnly||favs.has(card.dataset.id))&&(!q||card.dataset.search.includes(q));
          card.classList.toggle("hidden",!ok); if(ok)shown++;
        });
        const c=sec.querySelector('[data-role="daycount"]'); if(c)c.textContent=shown+" 个职位";
        sec.style.display=shown?"":"none"; visible+=shown;
      });
      countEl.innerHTML="显示 <b>"+visible+"</b> 个职位";
      emptyEl.classList.toggle("show",visible===0);
    }

    document.addEventListener("keydown",e=>{
      const tag=(e.target.tagName||"").toLowerCase();
      if(tag==="input"||tag==="select"||tag==="textarea")return;
      if(e.key==="/"){ e.preventDefault(); searchEl.focus(); }
      else if(e.key.toLowerCase()==="t"){ setTheme(document.documentElement.getAttribute('data-theme')==="dark"?"light":"dark"); }
    });

    const totop=document.getElementById("totop");
    addEventListener("scroll",()=>{ totop.classList.toggle("show", window.scrollY>600); },{passive:true});
    totop.addEventListener("click",()=>scrollTo({top:0,behavior:"smooth"}));
  </script>
  <script src="guestbook.js"></script>
</body>
</html>
