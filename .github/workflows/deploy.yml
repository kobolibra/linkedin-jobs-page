name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: "__TOKEN_EXPR__"
          publish_dir: ./
